<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CineVault — Discover & Rate Movies</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>

</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Cine<span>Vault</span></div>
  <!-- <nav>
    <a href="#">Movies</a>
    <a href="#">Top Rated</a>
    <a href="#">Genres</a>
    <a href="#">About</a>
  </nav> -->
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-tag">🎬 Your Personal Cinema</div>
  <h1>Discover & Rate <em>Great Films</em></h1>
  <p>Explore a curated collection of movies. Rate what you've watched. Find your next obsession.</p>
</section>

<!-- CONTROLS -->
<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search movies…" oninput="filterMovies()"/>
  </div>
  <select id="genreFilter" onchange="filterMovies()">
    <option value="">All Genres</option>
    <option value="Action">Action</option>
    <option value="Drama">Drama</option>
    <option value="Sci-Fi">Sci-Fi</option>
    <option value="Crime">Crime</option>
    <option value="Animation">Animation</option>
    <option value="Fantasy">Fantasy</option>
    <option value="Horror">Horror</option>
    <option value="Romance">Romance</option>
  </select>
  <select id="sortFilter" onchange="filterMovies()">
    <option value="">Sort By</option>
    <option value="rating">Highest Rated</option>
    <option value="year_desc">Newest First</option>
    <option value="year_asc">Oldest First</option>
    <option value="title">A → Z</option>
  </select>
  <div class="count-badge">Showing <span id="movieCount">0</span> movies</div>
</div>

<!-- MOVIES GRID -->
<div class="movies-grid" id="moviesGrid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-hero">
      <img id="modalBanner" src="" alt=""/>
    </div>
    <div class="modal-body">
      <div class="modal-header-info">
        <img class="modal-poster" id="modalPoster" src="" alt=""/>
        <div class="modal-title-block">
          <div class="modal-title" id="modalTitle"></div>
          <div class="modal-meta" id="modalMeta"></div>
        </div>
      </div>
      <div class="modal-section">
        <h3>Synopsis</h3>
        <p id="modalDesc"></p>
      </div>
      <div class="modal-section">
        <h3>Cast</h3>
        <div class="cast-list" id="modalCast"></div>
      </div>
      <div class="modal-section">
        <h3>Director</h3>
        <p id="modalDirector"></p>
      </div>
      <a class="trailer-btn" id="modalTrailerBtn" href="#" target="_blank">
        ▶ Watch Trailer
      </a>
      <div class="modal-rate-section">
        <h3>Your Rating</h3>
        <div class="modal-stars" id="modalStars"></div>
        <div class="rate-feedback" id="rateFeedback"></div>
      </div>
    </div>
  </div>
</div>

<footer>
  Built with <i data-lucide="heart"></i>   by <strong>CineVault</strong> &nbsp;·&nbsp; Movie Listing & Rating UI
</footer>
<script src="script.js"></script>
</body>
</html>
